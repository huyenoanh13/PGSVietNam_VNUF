<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>BẢN ĐỒ THÔNG TIN SẢN PHẨM HỮU CƠ PGS - PGS Việt Nam</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet-svg-shape-markers.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/aphntnh_1.js"></script>
        <script src="data/aphnx_2.js"></script>
        <script src="data/ThngtinPGS_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:16, minZoom:1
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topleft'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>BẢN ĐỒ THÔNG TIN SẢN PHẨM HỮU CƠ PGS - PGS Việt Nam</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'bottomright'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'
                this._div.setAttribute("onmouseenter", "abstract.show()");
                this._div.setAttribute("onmouseleave", "abstract.hide()");
                this.hide();
                return this._div;
            };
            abstract.hide = function () {
                this._div.classList.remove("abstractUncollapsed");
                this._div.classList.add("abstract");
                this._div.innerHTML = 'i'
            }
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'PGS là một hệ thống xác nhận chất lượng có sự tham gia của tổ chức và cá nhân liên quan trực tiếp đến quá trình sản xuất, phân phối, tiêu thụ, sử dụng sản phẩm vào các hoạt động giám sát đánh giá và đảm bảo chất lượng sản phẩm khi cung cấp cho thị trường';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            if (bounds_group.getLayers().length) {
                map.fitBounds(bounds_group.getBounds());
            }
            map.setMaxBounds(map.getBounds());
            map.setMinZoom(map.getZoom());
        }
        map.createPane('pane_VietbandoMaps_0');
        map.getPane('pane_VietbandoMaps_0').style.zIndex = 400;
        var layer_VietbandoMaps_0 = L.tileLayer('http://images.vietbando.com/ImageLoader/GetImage.ashx?Ver=2016&LayerIds=VBD&Y={y}&X={x}&Level={z}', {
            pane: 'pane_VietbandoMaps_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 16,
        });
        layer_VietbandoMaps_0;
        map.addLayer(layer_VietbandoMaps_0);
        function pop_aphntnh_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Tên tỉnh</th>\
                        <td>' + (feature.properties['ten'] !== null ? autolinker.link(String(feature.properties['ten']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_aphntnh_1_0() {
            return {
                pane: 'pane_aphntnh_1',
                opacity: 1,
                color: 'rgba(30,20,20,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(197,240,253,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_aphntnh_1');
        map.getPane('pane_aphntnh_1').style.zIndex = 401;
        map.getPane('pane_aphntnh_1').style['mix-blend-mode'] = 'normal';
        var layer_aphntnh_1 = new L.geoJson(json_aphntnh_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_aphntnh_1',
            layerName: 'layer_aphntnh_1',
            pane: 'pane_aphntnh_1',
            onEachFeature: pop_aphntnh_1,
            style: style_aphntnh_1_0,
        });
        bounds_group.addLayer(layer_aphntnh_1);
        map.addLayer(layer_aphntnh_1);
        function pop_aphnx_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Tên xã</th>\
                        <td>' + (feature.properties['tenXa'] !== null ? autolinker.link(String(feature.properties['tenXa']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Trước sáp nhập</th>\
                        <td>' + (feature.properties['ghiChu'] !== null ? autolinker.link(String(feature.properties['ghiChu']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_aphnx_2_0() {
            return {
                pane: 'pane_aphnx_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(241,177,145,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_aphnx_2');
        map.getPane('pane_aphnx_2').style.zIndex = 402;
        map.getPane('pane_aphnx_2').style['mix-blend-mode'] = 'normal';
        var layer_aphnx_2 = new L.geoJson(json_aphnx_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_aphnx_2',
            layerName: 'layer_aphnx_2',
            pane: 'pane_aphnx_2',
            onEachFeature: pop_aphnx_2,
            style: style_aphnx_2_0,
        });
        bounds_group.addLayer(layer_aphnx_2);
        map.addLayer(layer_aphnx_2);
        function pop_ThngtinPGS_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Tên nhóm PGS</th>\
                        <td>' + (feature.properties['Ten_nhom'] !== null ? autolinker.link(String(feature.properties['Ten_nhom']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Địa chỉ</th>\
                        <td>' + (feature.properties['Dia chi'] !== null ? autolinker.link(String(feature.properties['Dia chi']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Liên hệ</th>\
                        <td>' + (feature.properties['Lien he'] !== null ? autolinker.link(String(feature.properties['Lien he']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Mã nhóm</th>\
                        <td>' + (feature.properties['Ma nhom'] !== null ? autolinker.link(String(feature.properties['Ma nhom']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Diện tích (m2)</th>\
                        <td>' + (feature.properties['Dien tich'] !== null ? autolinker.link(String(feature.properties['Dien tich']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Diện tích chuyển đổi</th>\
                        <td>' + (feature.properties['Dien tic_1'] !== null ? autolinker.link(String(feature.properties['Dien tic_1']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Số thành viên</th>\
                        <td>' + (feature.properties['So TV'] !== null ? autolinker.link(String(feature.properties['So TV']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Cánh đồng</th>\
                        <td>' + (feature.properties['Canh dong'] !== null ? autolinker.link(String(feature.properties['Canh dong']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Người đại diện</th>\
                        <td>' + (feature.properties['Dai dien'] !== null ? autolinker.link(String(feature.properties['Dai dien']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['image'] !== null ? '<img src="images/' + String(feature.properties['image']).replace(/[\\/:]/g, '_').trim().replace(/'/g, '\'').replace(/"/g, '&quot;') + '">' : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['image2'] !== null ? '<img src="images/' + String(feature.properties['image2']).replace(/[\\/:]/g, '_').trim().replace(/'/g, '\'').replace(/"/g, '&quot;') + '">' : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_ThngtinPGS_3_0() {
            return {
                pane: 'pane_ThngtinPGS_3',
                radius: 12.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(68,220,96,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_ThngtinPGS_3');
        map.getPane('pane_ThngtinPGS_3').style.zIndex = 403;
        map.getPane('pane_ThngtinPGS_3').style['mix-blend-mode'] = 'normal';
        var layer_ThngtinPGS_3 = new L.geoJson(json_ThngtinPGS_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_ThngtinPGS_3',
            layerName: 'layer_ThngtinPGS_3',
            pane: 'pane_ThngtinPGS_3',
            onEachFeature: pop_ThngtinPGS_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.shapeMarker(latlng, style_ThngtinPGS_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_ThngtinPGS_3);
        map.addLayer(layer_ThngtinPGS_3);
        var overlaysTree = [
            {label: '<img src="legend/ThngtinPGS_3.png" /> Thông tin PGS', layer: layer_ThngtinPGS_3},
            {label: '<img src="legend/aphnx_2.png" /> Địa phận xã', layer: layer_aphnx_2},
            {label: '<img src="legend/aphntnh_1.png" /> Địa phận tỉnh', layer: layer_aphntnh_1},
            {label: "Vietbando Maps", layer: layer_VietbandoMaps_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        var i = 0;
        layer_aphntnh_1.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['ten'] !== null?String('<div style="color: #2809f1; font-size: 18pt; font-weight: bold; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['ten']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_aphntnh_1'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        var i = 0;
        layer_aphnx_2.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['tenXa'] !== null?String('<div style="color: #781e29; font-size: 15pt; font-weight: bold; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['tenXa']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_aphnx_2'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        var i = 0;
        layer_ThngtinPGS_3.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['Ten_nhom'] !== null?String('<div style="color: #14663a; font-size: 13pt; font-weight: bold; font-family: \'Arial\', sans-serif;">' + layer.feature.properties['Ten_nhom']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_ThngtinPGS_3'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_aphntnh_1,layer_aphnx_2,layer_ThngtinPGS_3]);
        map.on("zoomend", function(){
            resetLabels([layer_aphntnh_1,layer_aphnx_2,layer_ThngtinPGS_3]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_aphntnh_1,layer_aphnx_2,layer_ThngtinPGS_3]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_aphntnh_1,layer_aphnx_2,layer_ThngtinPGS_3]);
        });
        </script>        
    </body>
</html>
